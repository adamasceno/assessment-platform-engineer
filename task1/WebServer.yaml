AWSTemplateFormatVersion: '2010-09-09'
Description: Windows Web Server with S3, LB, Firewall, and certificate.

Parameters:
  DomainName:
    Type: String
    Default: '*.example.com'
  VpcId:
    Type: AWS::EC2::VPC::Id
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
  WindowsImageId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base'
  DesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 3

Resources:
  # S3 Bucket for Logs
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Enable encryption and versioning on the log bucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled        
  
  # S3 Bucket Policy required for ALB to deliver access logs
  LogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowALBLogDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${LogsBucket}/alb/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # IAM Role
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3LoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${LogsBucket}/*'

  # Security Group for the ALB - open to the internet on 443 only
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS traffic to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          Description: Allow HTTPS traffic from internet
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # Security Group for EC2 instances - only accepts traffic from the ALB and RDP from internal range
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS and RDP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
          # HTTPS access (TCP port 443)
        - IpProtocol: tcp
          Description: Allow HTTPS traffic from ALB only
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          # TCP access (port 3389)
        - IpProtocol: tcp 
          Description: Allow RDP access
          FromPort: 3389
          ToPort: 3389
          CidrIp: 10.0.0.0/8 #CidrIp: 0.0.0.0/0

  # ACM Certificate (HTTPS) 
  ## PENDING_VALIDATION until the CNAME to be addead
  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
  
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # EC2 Instance (Windows)
  WindowsInstanceLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        InstanceType: t3.micro
        ImageId: !Ref WindowsImageId
        MetadataOptions:
          HttpEndpoint: disabled
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        UserData:
          !Base64
            "Fn::Sub":
              - |
                <powershell>
                # Install IIS only if not already installed
                if ((Get-WindowsFeature -Name Web-Server).InstallState -ne 'Installed') {
                    Install-WindowsFeature -Name Web-Server, Web-Mgmt-Tools -IncludeManagementTools -Restart:$false
                }

                # Start and enable IIS service
                Set-Service -Name W3SVC -StartupType Automatic
                Start-Service -Name W3SVC

                </powershell>
              - {}

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: LogsBucketPolicy  # Ensure bucket policy exists before ALB tries to write logs
    Properties:
      # Explicitly set internet-facing (default would be internal)
      Scheme: internet-facing
      Type: application
      Subnets: !Ref Subnets
      SecurityGroups:
        - !Ref ALBSecurityGroup
      # Wire ALB access logs to the log bucket  
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref LogsBucket
        - Key: access_logs.s3.prefix
          Value: alb
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"

  # Load Balancer Target Group
  LBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Port: 443
      Protocol: HTTPS
      TargetType: instance
      # Add health check path and protocol
      HealthCheckPath: /
      HealthCheckProtocol: HTTPS
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3  

  # Load Balancer Listener
  LBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS-1-2-2017-01
      Certificates:
        - CertificateArn: !Ref SiteCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref LBTargetGroup
  
  # EC2 Auto Scaling Group (self-healing)
  WebServerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WindowsInstanceLaunchTemplate
        Version: !GetAtt WindowsInstanceLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier: !Ref Subnets
      TargetGroupARNs:
        - !Ref LBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300

  # Firewall
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: WebACLMetric
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRuleSetMetric
        - Name: AWS-AWSManagedRulesKnownBadInputsRuleSet
          Priority: 1
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSetMetric
  
  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
      WebACLArn: !GetAtt WebACL.Arn

Outputs:
  LoadBalancerDNS:
    Description: DNS Name of the ALB
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  LoadBalancerARN:
    Description: ARN of the ALB
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
  LogsBucketName:
    Description: S3 bucket for ALB access logs
    Value: !Ref LogsBucket
